version: '3.8'
services:
  db:
    image: postgres:14.1-alpine
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db:/var/lib/postgresql/data

  docker-python:
    build:
      context: .
    ports:
      - 5005:5002
    depends_on:
      - db

volumes:
  db:
    driver: local
